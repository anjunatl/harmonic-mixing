<html>
<head>
    <title>Harmonic Mixing</title>
    <link rel="stylesheet" type="text/css" href="mixer.css">
    <script type="text/javascript">
        window.getMixes = function () {
            var input = document.forms['mixer-input'].elements['camelotSignature'].value;
            var output = CamelotMixer.getMixesFor(input);
            if (output) {
                var basicOutput = output.possibleMixes.map(function (mix) {
                    return {
                        name: mix.name,
                        newMix: mix.newMix.signature
                    };
                });
                writeOutputToPage(input, basicOutput);
            } else {
                // writeErrorToPage();
            }
            return false;

            function writeOutputToPage(input, basicOutput) {
                var outputContainer = document.getElementById('output');
                var outputValue = document.createElement('pre');
                outputValue.innerText = JSON.stringify(basicOutput, null, 2);
                outputContainer.appendChild(outputValue);
            }

            // function writeErrorToPage() {
            //     var outputContainer = document.getElementById('output');
            //     var errorValue = document.createElement('div');
            //     errorValue.innerText = 'Check the camelot notation, it should be 1-12 & A or B. Example: 12A'
            //     outputContainer.replaceChild(errorValue);
            // }
        }
    </script>
</head>
<body>
    <div id="harmonic-mixer-container">
        <div id="heading">
            Harmonic Mixing
        </div>
        <div id="input">
            <form name="mixer-input">
                <input placeholder="Example: 12A" autofocus="autofocus" name="camelotSignature">
                <button type="button" onclick="return getMixes()">Go</button>
            </form>
        </div>
        <div id="output"></div>
    </div>
    <script type="text/javascript" src="camelot.mixer.js"></script>
</body>
</html>
